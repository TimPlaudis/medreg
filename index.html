<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedReg KZ — Реестр медицинских организаций</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #18181b;
      --card: #27272a;
      --text: #e4e4e7;
      --accent: #10b981;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    .card {
      background: var(--card);
      border: 1px solid #3f3f46;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
    }
    .modal {
      animation: modalPop 0.3s ease forwards;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .btn {
      background: var(--accent);
      transition: background 0.2s;
    }
    .btn:hover {
      background: #059669;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- HEADER -->
  <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-4xl">🩺</div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tight">MedReg KZ</h1>
          <p class="text-zinc-500 text-sm -mt-1">Реестр медицинских организаций Казахстана</p>
        </div>
      </div>
      <div class="text-4xl font-semibold text-emerald-400">68</div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-4 gap-8">

    <!-- ФИЛЬТРЫ -->
    <div class="lg:col-span-1">
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 sticky top-24">
        <h2 class="font-semibold text-lg mb-6 flex items-center gap-3">
          <i class="fa-solid fa-filter"></i> Фильтры
        </h2>
        
        <div class="space-y-6">
          <input id="searchInput" type="text" 
                 class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600 text-sm"
                 placeholder="Поиск организации...">

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Город</label>
            <select id="cityFilter" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none">
              <option value="">Все города</option>
              <option value="Астана">Астана</option>
              <option value="Алматы">Алматы</option>
              <option value="Шымкент">Шымкент</option>
              <option value="Актобе">Актобе</option>
              <option value="Караганда">Караганда</option>
            </select>
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Специализация</label>
            <select id="specFilter" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none">
              <option value="">Все специализации</option>
              <option value="Многопрофильная">Многопрофильная</option>
              <option value="Кардиология">Кардиология</option>
              <option value="Онкология">Онкология</option>
              <option value="Педиатрия">Педиатрия</option>
              <option value="Стоматология">Стоматология</option>
              <option value="Неврология">Неврология</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- СПИСОК -->
    <div class="lg:col-span-3">
      <h2 id="resultsCount" class="text-2xl font-semibold mb-8">Найдено: 68 организаций</h2>
      <div id="organizationsList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО -->
  <div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
    <div class="modal bg-zinc-900 rounded-3xl max-w-2xl w-full mx-4 overflow-hidden">
      <div class="p-8" id="modalContent"></div>
      <div class="border-t border-zinc-800 p-4 flex justify-end">
        <button onclick="closeModal()" class="px-8 py-3 text-zinc-400 hover:text-white">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    // Данные организаций (можно расширять)
    const organizations = [ /* ... тот же массив из предыдущей версии ... */ ];

    // (Вставь сюда весь массив organizations из моего предыдущего сообщения)

    function renderOrganizations(filtered) { /* ... */ }
    function showDetail(id) { /* ... */ }
    function closeModal() { /* ... */ }
    function filterOrganizations() { /* ... */ }

    document.addEventListener('DOMContentLoaded', () => {
      renderOrganizations(organizations);
      document.getElementById('searchInput').addEventListener('input', filterOrganizations);
      document.getElementById('cityFilter').addEventListener('change', filterOrganizations);
      document.getElementById('specFilter').addEventListener('change', filterOrganizations);
    });
  </script>
</body>
</html>
