<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedReg KZ — Реестр медицинских организаций</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15);
    }
    .theme-toggle {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

  <!-- HEADER -->
  <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 bg-emerald-600 rounded-2xl flex items-center justify-center text-3xl">🩺</div>
        <div>
          <h1 class="text-3xl font-semibold tracking-tight">MedReg KZ</h1>
          <p class="text-zinc-500 text-sm">Реестр медицинских организаций Казахстана</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div class="text-4xl font-semibold text-emerald-400">68</div>
          <div class="text-xs tracking-widest text-zinc-500">ОРГАНИЗАЦИЙ</div>
        </div>
        
        <button id="themeToggle" class="theme-toggle w-11 h-11 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl flex items-center justify-center text-xl">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-4 gap-8">

    <!-- ФИЛЬТРЫ -->
    <div class="lg:col-span-1">
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 sticky top-24">
        <h2 class="font-semibold text-lg mb-6 flex items-center gap-3">
          <i class="fa-solid fa-filter"></i> Фильтры
        </h2>

        <div class="space-y-6">
          <!-- Поиск -->
          <div>
            <input id="searchInput" type="text" 
                   class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600 text-sm"
                   placeholder="Поиск организации...">
          </div>

          <!-- Город -->
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Город</label>
            <select id="cityFilter" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
              <option value="">Все города</option>
              <option value="Астана">Астана</option>
              <option value="Алматы">Алматы</option>
              <option value="Шымкент">Шымкент</option>
              <option value="Актобе">Актобе</option>
              <option value="Караганда">Караганда</option>
            </select>
          </div>

          <!-- Тип -->
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Тип организации</label>
            <div class="grid grid-cols-2 gap-3">
              <button onclick="setTypeFilter(this)" data-type="" class="type-btn active px-4 py-3 rounded-2xl bg-emerald-600 text-white text-sm">Все</button>
              <button onclick="setTypeFilter(this)" data-type="gos" class="type-btn px-4 py-3 rounded-2xl border border-zinc-700 hover:bg-zinc-800 text-sm">Государственная</button>
              <button onclick="setTypeFilter(this)" data-type="private" class="type-btn px-4 py-3 rounded-2xl border border-zinc-700 hover:bg-zinc-800 text-sm">Частная</button>
            </div>
          </div>

          <!-- Специализация -->
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Специализация</label>
            <select id="specFilter" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
              <option value="">Все специализации</option>
              <option value="Многопрофильная">Многопрофильная</option>
              <option value="Кардиология">Кардиология</option>
              <option value="Онкология">Онкология</option>
              <option value="Педиатрия">Педиатрия</option>
              <option value="Стоматология">Стоматология</option>
              <option value="Неврология">Неврология</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- СПИСОК ОРГАНИЗАЦИЙ -->
    <div class="lg:col-span-3">
      <div class="flex justify-between items-center mb-8">
        <h2 id="resultsCount" class="text-2xl font-semibold">Найдено: 68 организаций</h2>
      </div>

      <div id="organizationsList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Карточки будут генерироваться через JavaScript -->
      </div>
    </div>
  </div>

  <script>
    const organizations = [
      { id: 1, name: "Национальный научный центр материнства и детства", city: "Астана", type: "gos", spec: "Педиатрия", address: "ул. Туркестан, 32", phone: "+7 (7172) 70-10-00", rating: 4.8 },
      { id: 2, name: "Клиника «Медицина»", city: "Алматы", type: "private", spec: "Многопрофильная", address: "проспект Достык, 85", phone: "+7 (727) 255-55-55", rating: 4.9 },
      { id: 3, name: "Актюбинская областная многопрофильная больница", city: "Актобе", type: "gos", spec: "Многопрофильная", address: "ул. Абая, 101", phone: "+7 (7132) 55-00-00", rating: 4.5 },
      { id: 4, name: "Центр кардиологии и сердечно-сосудистой хирургии", city: "Астана", type: "gos", spec: "Кардиология", address: "ул. Курганская, 12", phone: "+7 (7172) 79-00-00", rating: 4.7 },
      { id: 5, name: "Стоматологическая клиника «Dental Art»", city: "Алматы", type: "private", spec: "Стоматология", address: "ул. Байтурсынова, 45", phone: "+7 (727) 300-40-40", rating: 4.9 },
      { id: 6, name: "Шымкентская городская больница №1", city: "Шымкент", type: "gos", spec: "Многопрофильная", address: "ул. Тауке-хана, 78", phone: "+7 (7252) 53-00-00", rating: 4.3 },
      { id: 7, name: "Онкологический центр «Астана»", city: "Астана", type: "gos", spec: "Онкология", address: "ул. Мангилик Ел, 20", phone: "+7 (7172) 70-50-00", rating: 4.6 },
      { id: 8, name: "Клиника неврологии и нейрохирургии", city: "Алматы", type: "private", spec: "Неврология", address: "ул. Курмангазы, 112", phone: "+7 (727) 220-00-11", rating: 4.8 },
      // Добавь ещё данные при необходимости
    ];

    let currentTypeFilter = "";

    function renderOrganizations(filtered) {
      const container = document.getElementById('organizationsList');
      container.innerHTML = filtered.map(org => `
        <div class="card bg-zinc-900 border border-zinc-800 rounded-3xl p-6 hover:border-emerald-600">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-xl font-semibold mb-1">${org.name}</h3>
              <p class="text-zinc-400 text-sm">${org.address}</p>
              <p class="text-emerald-400 text-sm font-medium">${org.city}</p>
            </div>
            <div class="text-right">
              <div class="flex items-center gap-1 text-amber-400">
                <i class="fa-solid fa-star"></i>
                <span class="font-medium">${org.rating}</span>
              </div>
            </div>
          </div>

          <div class="flex gap-2 mt-6">
            <span class="px-4 py-1.5 text-xs font-medium bg-zinc-800 rounded-2xl">${org.spec}</span>
            <span class="px-4 py-1.5 text-xs font-medium ${org.type === 'gos' ? 'bg-blue-900 text-blue-300' : 'bg-emerald-900 text-emerald-300'} rounded-2xl">
              ${org.type === 'gos' ? 'Государственная' : 'Частная'}
            </span>
          </div>

          <div class="mt-6 pt-6 border-t border-zinc-800 flex justify-between items-center">
            <div class="text-sm text-zinc-400">${org.phone}</div>
            <button class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-2xl transition">
              Подробнее
            </button>
          </div>
        </div>
      `).join('');
    }

    function filterOrganizations() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const city = document.getElementById('cityFilter').value;
      const spec = document.getElementById('specFilter').value;

      let filtered = organizations;

      if (search) filtered = filtered.filter(o => o.name.toLowerCase().includes(search));
      if (city) filtered = filtered.filter(o => o.city === city);
      if (spec) filtered = filtered.filter(o => o.spec === spec);
      if (currentTypeFilter) filtered = filtered.filter(o => o.type === currentTypeFilter);

      document.getElementById('resultsCount').textContent = `Найдено: ${filtered.length} организаций`;
      renderOrganizations(filtered);
    }

    function setTypeFilter(btn) {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active', 'bg-emerald-600', 'text-white'));
      btn.classList.add('active', 'bg-emerald-600', 'text-white');
      currentTypeFilter = btn.getAttribute('data-type');
      filterOrganizations();
    }

    // Тёмная/светлая тема
    document.getElementById('themeToggle').addEventListener('click', () => {
      if (document.documentElement.classList.contains('light')) {
        document.documentElement.classList.remove('light');
        document.getElementById('themeToggle').innerHTML = `<i class="fa-solid fa-moon"></i>`;
      } else {
        document.documentElement.classList.add('light');
        document.getElementById('themeToggle').innerHTML = `<i class="fa-solid fa-sun"></i>`;
      }
    });

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      renderOrganizations(organizations);

      document.getElementById('searchInput').addEventListener('input', filterOrganizations);
      document.getElementById('cityFilter').addEventListener('change', filterOrganizations);
      document.getElementById('specFilter').addEventListener('change', filterOrganizations);
    });
  </script>
</body>
</html>
