<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedReg KZ — Реестр медицинских организаций Казахстана</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- HEADER -->
  <header class="bg-[#0A2540] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#1D9E75] rounded-2xl flex items-center justify-center text-2xl">🩺</div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">MedReg KZ</h1>
          <p class="text-sm text-gray-400 -mt-1">Реестр медицинских организаций</p>
        </div>
      </div>
      <div class="text-right">
        <div class="text-3xl font-semibold">50</div>
        <div class="text-xs uppercase tracking-widest text-gray-400">организаций</div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-4 gap-8">

    <!-- FILTERS -->
    <div class="lg:col-span-1 bg-white rounded-3xl shadow p-6 h-fit">
      <h2 class="font-semibold text-lg mb-6 flex items-center gap-2">
        <i class="fa-solid fa-sliders"></i> Фильтры
      </h2>

      <!-- Поиск -->
      <div class="mb-6">
        <input id="searchInput" type="text" 
               class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none focus:border-[#1D9E75]"
               placeholder="Поиск по названию...">
      </div>

      <!-- Город -->
      <div class="mb-6">
        <label class="block text-sm font-medium mb-2">Город</label>
        <select id="cityFilter" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none">
          <option value="">Все города</option>
          <option value="Астана">Астана</option>
          <option value="Алматы">Алматы</option>
          <option value="Шымкент">Шымкент</option>
          <option value="Актобе">Актобе</option>
        </select>
      </div>

      <!-- Тип организации -->
      <div class="mb-6">
        <label class="block text-sm font-medium mb-2">Тип организации</label>
        <div class="flex gap-2">
          <button onclick="filterType(this)" data-type="all" class="flex-1 py-3 px-4 rounded-2xl bg-[#0A2540] text-white text-sm font-medium">Все</button>
          <button onclick="filterType(this)" data-type="gos" class="flex-1 py-3 px-4 rounded-2xl border border-gray-200 hover:bg-gray-50 text-sm font-medium">Государственная</button>
          <button onclick="filterType(this)" data-type="private" class="flex-1 py-3 px-4 rounded-2xl border border-gray-200 hover:bg-gray-50 text-sm font-medium">Частная</button>
        </div>
      </div>

      <!-- Специализация -->
      <div>
        <label class="block text-sm font-medium mb-2">Специализация</label>
        <select id="specFilter" class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:outline-none">
          <option value="">Все специализации</option>
          <option value="Многопрофильная">Многопрофильная</option>
          <option value="Кардиология">Кардиология</option>
          <option value="Онкология">Онкология</option>
          <option value="Педиатрия">Педиатрия</option>
          <option value="Стоматология">Стоматология</option>
        </select>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="lg:col-span-3">
      <div class="flex justify-between items-center mb-6">
        <h2 id="resultsCount" class="text-xl font-semibold">Найдено: 50 организаций</h2>
        
        <div class="flex border border-gray-200 rounded-3xl p-1">
          <button onclick="switchView(0)" id="listBtn"
                  class="px-6 py-2 rounded-3xl font-medium flex items-center gap-2 active">
            <i class="fa-solid fa-list"></i> Список
          </button>
          <button onclick="switchView(1)" id="mapBtn"
                  class="px-6 py-2 rounded-3xl font-medium flex items-center gap-2">
            <i class="fa-solid fa-map"></i> Карта
          </button>
        </div>
      </div>

      <!-- LIST VIEW -->
      <div id="listView">
        <div id="organizationsList" class="space-y-4"></div>
      </div>

      <!-- MAP VIEW -->
      <div id="mapView" class="hidden bg-white rounded-3xl shadow p-8 text-center h-[600px] flex flex-col items-center justify-center">
        <i class="fa-solid fa-map text-8xl text-gray-300 mb-6"></i>
        <h3 class="text-2xl font-semibold mb-2">Интерактивная карта</h3>
        <p class="text-gray-500 max-w-md">Здесь будет карта Казахстана с метками организаций.<br>В полной версии можно подключить Leaflet или Yandex Maps.</p>
      </div>
    </div>
  </div>

  <script>
    // Пример данных (можно расширить до 50)
    const organizations = [
      { name: "Национальный научный центр материнства и детства", city: "Астана", type: "gos", spec: "Педиатрия", address: "ул. Туркестан, 32" },
      { name: "Клиника «Медицина»", city: "Алматы", type: "private", spec: "Многопрофильная", address: "проспект Достык, 85" },
      { name: "Актюбинская областная многопрофильная больница", city: "Актобе", type: "gos", spec: "Многопрофильная", address: "ул. Абая, 101" },
      // ... можно добавить ещё 47 записей
    ];

    function renderList(filtered) {
      const container = document.getElementById('organizationsList');
      container.innerHTML = filtered.map(org => `
        <div class="card-hover bg-white rounded-3xl shadow p-6 flex gap-6 items-center">
          <div class="w-12 h-12 bg-[#1D9E75]/10 text-[#1D9E75] rounded-2xl flex items-center justify-center text-3xl">🩺</div>
          <div class="flex-1">
            <h3 class="font-semibold text-xl">${org.name}</h3>
            <p class="text-gray-500">${org.address} • ${org.city}</p>
            <div class="flex gap-3 mt-3">
              <span class="px-4 py-1 text-xs font-medium bg-gray-100 rounded-full">${org.spec}</span>
              <span class="px-4 py-1 text-xs font-medium ${org.type === 'gos' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'} rounded-full">
                ${org.type === 'gos' ? 'Государственная' : 'Частная'}
              </span>
            </div>
          </div>
          <button class="px-8 py-3 bg-[#0A2540] text-white rounded-2xl hover:bg-black transition">Подробнее</button>
        </div>
      `).join('');
    }

    // Простая фильтрация (можно доработать)
    function filterOrganizations() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const city = document.getElementById('cityFilter').value;
      const spec = document.getElementById('specFilter').value;

      let filtered = organizations;

      if (search) filtered = filtered.filter(o => o.name.toLowerCase().includes(search));
      if (city) filtered = filtered.filter(o => o.city === city);
      if (spec) filtered = filtered.filter(o => o.spec === spec);

      document.getElementById('resultsCount').textContent = `Найдено: ${filtered.length} организаций`;
      renderList(filtered);
    }

    function switchView(view) {
      document.getElementById('listView').classList.toggle('hidden', view === 1);
      document.getElementById('mapView').classList.toggle('hidden', view === 0);
    }

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      renderList(organizations);
      document.getElementById('searchInput').addEventListener('input', filterOrganizations);
      document.getElementById('cityFilter').addEventListener('change', filterOrganizations);
      document.getElementById('specFilter').addEventListener('change', filterOrganizations);
    });
  </script>
</body>
</html>
